include mime.types;
default_type application/octet-stream;

# Define proxy cache path here
proxy_cache_path /var/cache/nginx/default_cache levels=1:2 keys_zone=my_cache:20m inactive=60m;
proxy_cache_path /var/cache/nginx/cmc_cache levels=1:2 keys_zone=my_cache_cmc:50m inactive=7d max_size=20g use_temp_path=off;
