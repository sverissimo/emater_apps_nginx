# Keep internal rewrite if you prefer no 301
location = /pnae/web {
    rewrite ^ /pnae/web/ last;
}

location ^~ /pnae/web/_next/ {
    alias /usr/share/nginx/html/pnae/_next/;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    try_files $uri =404;
}

location ~* ^/pnae/web/.*\.(?:js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
    alias /usr/share/nginx/html/pnae/;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    try_files $uri =404;
}

location ^~ /pnae/web/ {
    alias /usr/share/nginx/html/pnae/;
    index index.html;
    try_files $uri $uri.html $uri/ /pnae/web/index.html;
    add_header Cache-Control "public, max-age=3600";
}
