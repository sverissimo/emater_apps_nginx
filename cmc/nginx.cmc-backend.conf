# More specific location wins over /cmc_backend
location ~* ^/cmc_backend/(gestao/)?geo/getMvt/.*\.pbf$ {
    # If layers contains "poligono", internally reroute to a named location
    # so we can apply a different cache TTL (proxy_cache_valid is not allowed inside if).
    error_page 418 = @cmc_tiles_poligono;
    if ($arg_layers ~* "poligono") {
        return 418;
    }

    # keep the same rewrite logic
    rewrite ^/cmc_backend//+(.*)$ /cmc_backend/$1 break;
    rewrite ^/cmc_backend/(.*)$ /$1 break;

    proxy_pass http://cmc_backend;

    # CORS + headers (same as base)
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Credentials;

    if ($http_origin) {
        add_header Access-Control-Allow-Origin $http_origin always;
    }
    add_header Access-Control-Allow-Credentials true;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PATCH, PUT, DELETE";
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept";

    #Test cache headers - HIT | MISS
    # add_header X-Cache-Status $upstream_cache_status always;
    # add_header X-Cache-Key "$scheme$proxy_host$request_uri" always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;

    # default cache for tiles
    proxy_cache my_cache;
    proxy_buffering on;
    proxy_cache_valid 200 1m;

    # make sure cache key varies by layers
    proxy_cache_key "$scheme$proxy_host$request_uri";
}

location @cmc_tiles_poligono {
    # keep the same rewrite logic
    rewrite ^/cmc_backend//+(.*)$ /cmc_backend/$1 break;
    rewrite ^/cmc_backend/(.*)$ /$1 break;

    proxy_pass http://cmc_backend;

    # CORS + headers (same as base)
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Credentials;

    if ($http_origin) {
        add_header Access-Control-Allow-Origin $http_origin always;
    }
    add_header Access-Control-Allow-Credentials true;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PATCH, PUT, DELETE";
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept";
    add_header X-Cache-Status $upstream_cache_status always;
    add_header X-Cache-Key "$scheme$proxy_host$request_uri" always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;

    # Longer cache for polygon layers
    proxy_cache my_cache;
    proxy_buffering on;
    proxy_cache_valid 200 7d;

    proxy_cache_key "$scheme$proxy_host$request_uri";
}

# Base fallback for everything else
location /cmc_backend {
    rewrite ^/cmc_backend//+(.*)$ /cmc_backend/$1 break;
    rewrite ^/cmc_backend/(.*)$ /$1 break;

    proxy_pass http://cmc_backend;

    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Credentials;

    if ($http_origin) {
        add_header Access-Control-Allow-Origin $http_origin always;
    }

    add_header Access-Control-Allow-Credentials true;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PATCH, PUT, DELETE";
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept";

    if ($request_method = OPTIONS) {
        return 204;
    }

    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;

    # general cache behavior for non-tiles
    proxy_cache my_cache;
    proxy_buffering on;
    proxy_cache_valid 200 30s;
}
